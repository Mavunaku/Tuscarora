<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — The Tuscarora Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: Georgia, serif;
            background: #f5f5f0;
        }

        .font-serif {
            font-family: Georgia, serif;
        }

        .btn-primary {
            background-color: #1a3a2a;
            color: white;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #0d1e16;
        }

        .text-accent {
            color: #d4a843;
        }

        .card-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 antialiased">
    <div class="w-full max-w-md">

        <!-- Header (Matches Email Design) -->
        <div class="bg-[#1a3a2a] rounded-t-2xl p-8 text-center border-b border-[#2a4a3a]">
            <h1 class="text-accent text-2xl font-light tracking-wide mb-1">The Tuscarora Club</h1>
            <p class="text-emerald-400 text-[10px] uppercase tracking-[0.3em] font-bold opacity-80">Password Reset</p>
        </div>

        <!-- Main Card -->
        <div class="bg-white rounded-b-2xl card-shadow p-10 border border-stone-200">

            <!-- Loading State -->
            <div id="loading" class="text-center py-8">
                <div
                    class="w-8 h-8 border-2 border-emerald-900/10 border-t-emerald-900 rounded-full animate-spin mx-auto mb-4">
                </div>
                <p class="text-stone-400 text-xs font-bold uppercase tracking-widest">Verifying Security Token...</p>
            </div>

            <!-- Reset Form -->
            <form id="form-area" class="hidden animate-in fade-in duration-500"
                onsubmit="event.preventDefault(); doReset();">
                <h2 class="text-xl text-stone-900 mb-2">Set Your New Password</h2>
                <p class="text-stone-500 text-sm mb-8 leading-relaxed italic" id="user-label"></p>

                <div class="space-y-6">
                    <div>
                        <label
                            class="text-[10px] font-black uppercase tracking-widest text-stone-400 block mb-2 font-sans">New
                            Password</label>
                        <div class="relative">
                            <input id="new-password" type="password" placeholder="••••••••"
                                class="w-full px-5 py-3.5 pr-12 bg-stone-50 border border-stone-200 rounded-xl text-stone-800 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all shadow-inner" />
                            <button type="button" onclick="togglePass('new-password', this)"
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-stone-300 hover:text-emerald-900 transition-colors focus:outline-none">
                                <i data-lucide="eye" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                    <div>
                        <label
                            class="text-[10px] font-black uppercase tracking-widest text-stone-400 block mb-2 font-sans">Confirm
                            New Password</label>
                        <div class="relative">
                            <input id="confirm-password" type="password" placeholder="••••••••"
                                class="w-full px-5 py-3.5 pr-12 bg-stone-50 border border-stone-200 rounded-xl text-stone-800 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all shadow-inner" />
                            <button type="button" onclick="togglePass('confirm-password', this)"
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-stone-300 hover:text-emerald-900 transition-colors focus:outline-none">
                                <i data-lucide="eye" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Messages -->
                <div id="error-msg"
                    class="hidden mt-6 px-4 py-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-xs font-bold text-center">
                </div>
                <div id="success-msg"
                    class="hidden mt-6 px-4 py-3 bg-emerald-50 border border-emerald-200 rounded-xl text-emerald-700 text-xs font-bold text-center">
                </div>

                <button id="submit-btn" type="submit"
                    class="mt-8 w-full py-4 btn-primary rounded-xl font-bold uppercase tracking-widest text-xs shadow-lg shadow-emerald-900/10 active:scale-[0.98]">
                    Update Credentials
                </button>

                <div class="mt-8 pt-8 border-t border-stone-100 text-center">
                    <a href="/index.html"
                        class="text-stone-400 hover:text-emerald-900 text-[10px] font-black uppercase tracking-widest transition-colors">
                        Back to Member Portal
                    </a>
                </div>
            </form>

            <!-- Link Error State -->
            <div id="error-area" class="hidden text-center py-6">
                <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6">
                    <span class="text-2xl">⚠️</span>
                </div>
                <h3 class="text-red-600 font-bold text-lg mb-2">Invalid Reset Link</h3>
                <p class="text-stone-500 text-sm leading-relaxed mb-8 px-4">This link has expired or has already been
                    used to update your password. Please request a new recovery link.</p>

                <a href="/index.html"
                    class="inline-block px-10 py-3.5 btn-primary rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-lg">
                    Return to Login
                </a>
            </div>
        </div>

        <p class="mt-10 text-center text-stone-400 text-[9px] font-black uppercase tracking-[0.4em] opacity-40">
            Tuscarora Club • Private Digital Ledger</p>
    </div>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        // Extract parameters from URL
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const user = params.get('user');

        // Initial setup on load
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');

                if (!token || !user) {
                    document.getElementById('error-area').classList.remove('hidden');
                } else {
                    document.getElementById('form-area').classList.remove('hidden');
                    document.getElementById('user-label').textContent = `Set a new password for ${user}`;
                }
                // Initialize Lucide icons
                lucide.createIcons();
            }, 1000);
        });

        function togglePass(id, btn) {
            const input = document.getElementById(id);
            const isPass = input.type === 'password';
            input.type = isPass ? 'text' : 'password';
            btn.innerHTML = `<i data-lucide="${isPass ? 'eye-off' : 'eye'}" class="w-5 h-5"></i>`;
            lucide.createIcons();
        }

        async function doReset() {
            const newPass = document.getElementById('new-password').value.trim();
            const confirmPass = document.getElementById('confirm-password').value.trim();
            const errEl = document.getElementById('error-msg');
            const successEl = document.getElementById('success-msg');
            const btn = document.getElementById('submit-btn');

            // Reset states
            errEl.classList.add('hidden');
            successEl.classList.add('hidden');

            // Client-side validation
            if (!newPass || newPass.length < 4) {
                errEl.textContent = 'Password must be at least 4 characters long.';
                return errEl.classList.remove('hidden');
            }
            if (newPass !== confirmPass) {
                errEl.textContent = 'New passwords do not match.';
                return errEl.classList.remove('hidden');
            }

            // Processing state
            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, username: user, newPassword: newPass })
                });
                const data = await res.json();

                if (!res.ok) {
                    errEl.textContent = data.error || 'The reset link is no longer valid.';
                    errEl.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = 'Update Credentials';
                } else {
                    successEl.textContent = 'Password updated! Redirecting to login...';
                    successEl.classList.remove('hidden');

                    // Disable inputs
                    document.getElementById('new-password').disabled = true;
                    document.getElementById('confirm-password').disabled = true;
                    btn.classList.add('hidden');

                    // Redirect after short delay
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 2500);
                }
            } catch (e) {
                errEl.textContent = 'Network error. Please verify your connection and try again.';
                errEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Update Credentials';
            }
        }
    </script>
</body>

</html>
